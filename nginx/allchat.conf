# All_Chat — Nginx Site Config
# HTTP only. Rate limit zones are in nginx.conf http{} block (added by setup.sh).
# To add TLS: sudo certbot --nginx -d yourdomain.com

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size  12M;
    client_body_timeout   30s;
    client_header_timeout 30s;
    keepalive_timeout     75s;
    send_timeout          30s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml font/woff font/woff2;

    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "DENY"                            always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    location /static/ {
        alias /app/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        location ~* \.(php|py|sh|cgi)$ { deny all; }
    }

    location ~ ^/api/auth/(login|register|forgot-password|reset-password)$ {
        limit_req        zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass       http://127.0.0.1:8000;
        include          /etc/nginx/snippets/proxy-params.conf;
    }

    location /api/ {
        limit_req        zone=global burst=30 nodelay;
        limit_conn       perip 20;
        limit_req_status 429;
        proxy_pass       http://127.0.0.1:8000;
        include          /etc/nginx/snippets/proxy-params.conf;
    }

    location / {
        limit_req  zone=global burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include    /etc/nginx/snippets/proxy-params.conf;
    }

    location ~ /\. {
        deny all;
        access_log    off;
        log_not_found off;
    }

    access_log /var/log/nginx/allchat_access.log;
    error_log  /var/log/nginx/allchat_error.log warn;
}
