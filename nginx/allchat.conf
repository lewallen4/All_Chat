# ═══════════════════════════════════════════════════════════════
# All_Chat — Nginx Configuration
#
# HTTP-only by default (no TLS required).
# To add TLS later: run  sudo certbot --nginx -d yourdomain.com
# and update ALLOWED_ORIGINS in /app/backend/.env
#
# Rate limiting zones are injected into nginx.conf http{} block
# by setup.sh — do NOT redefine them here.
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ── Limits ────────────────────────────────────────────────────
    client_max_body_size  12M;
    client_body_timeout   30s;
    client_header_timeout 30s;
    keepalive_timeout     75s;
    send_timeout          30s;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json image/svg+xml font/woff font/woff2;

    # ── Security headers (no HSTS since no TLS) ───────────────────
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "DENY"                          always;
    add_header X-XSS-Protection        "1; mode=block"                 always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Static files ──────────────────────────────────────────────
    location /static/ {
        alias /app/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media uploads ─────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;

        location ~* \.(php|py|js|sh|cgi)$ {
            deny all;
        }
    }

    # ── Auth (stricter rate limit) ────────────────────────────────
    location ~ ^/api/auth/(login|register|forgot-password|reset-password)$ {
        limit_req        zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass       http://127.0.0.1:8000;
        include          /etc/nginx/snippets/proxy-params.conf;
    }

    # ── API ───────────────────────────────────────────────────────
    location /api/ {
        limit_req        zone=global burst=30 nodelay;
        limit_conn       perip 20;
        limit_req_status 429;
        proxy_pass       http://127.0.0.1:8000;
        include          /etc/nginx/snippets/proxy-params.conf;
    }

    # ── SPA ───────────────────────────────────────────────────────
    location / {
        limit_req  zone=global burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include    /etc/nginx/snippets/proxy-params.conf;
    }

    # ── Block hidden files ────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log    off;
        log_not_found off;
    }

    access_log /var/log/nginx/allchat_access.log;
    error_log  /var/log/nginx/allchat_error.log warn;
}
