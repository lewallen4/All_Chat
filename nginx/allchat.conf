# ═══════════════════════════════════════════════════════════════
# All_Chat — Nginx Configuration
# Production-ready: TLS, rate limiting, security headers,
# gzip, static file caching, upstream to FastAPI.
# ═══════════════════════════════════════════════════════════════

# ── Rate limiting zones (defined in http context) ──────────────
# These go inside nginx.conf http {} block, NOT inside a server block.
# We include them here for reference — setup.sh injects them automatically.
#
# limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=auth:10m   rate=2r/s;
# limit_conn_zone $binary_remote_addr zone=perip:10m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── TLS ───────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-Frame-Options           "DENY"                 always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json image/svg+xml font/woff font/woff2;

    # ── Upload size limit ─────────────────────────────────────────
    client_max_body_size 12M;

    # ── Request timeouts ──────────────────────────────────────────
    client_body_timeout   30s;
    client_header_timeout 30s;
    keepalive_timeout     75s;
    send_timeout          30s;

    # ── Static files (long cache) ─────────────────────────────────
    location /static/ {
        alias /app/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # ── Media files ───────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;

        # Only serve image types
        location ~* \.(jpg|jpeg|png|gif|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Block anything else in media dir
        location ~* \.(php|py|js|sh|cgi)$ {
            deny all;
        }
    }

    # ── Auth endpoints (stricter rate limit) ──────────────────────
    location ~ ^/api/auth/(login|register|forgot-password|reset-password)$ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ── API (standard rate limit) ─────────────────────────────────
    location /api/ {
        limit_req zone=global burst=30 nodelay;
        limit_conn perip 20;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ── SPA fallback ──────────────────────────────────────────────
    location / {
        limit_req zone=global burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ── Block hidden files ────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logs ──────────────────────────────────────────────────────
    access_log /var/log/nginx/allchat_access.log;
    error_log  /var/log/nginx/allchat_error.log warn;
}
